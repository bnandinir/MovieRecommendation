<!DOCTYPE html>
<html>
<head>
    <title>Movie Recommendation System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f8f9fa;
        }

        .poster{
            width:180px;
            height:250px;
            object-fit:cover;
            display:block;
            margin:15px auto;
            border-radius:10px;
        }

        .card{
            text-align:center;
            padding:15px;
            height:100%;
        }

        h1{
            font-weight:bold;
        }

        .description{
            font-size:14px;
            color:#555;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="card shadow p-4">

        <h1 class="text-primary text-center">
            🎬 Movie Recommendation System
        </h1>

        <form method="POST">
            {% csrf_token %}

            <label class="form-label mt-3"><b>Select Genre</b></label>

            <select name="genre" class="form-select">
                <option value="Action" {% if selected_genre == "Action" %}selected{% endif %}>Action</option>
                <option value="Comedy" {% if selected_genre == "Comedy" %}selected{% endif %}>Comedy</option>
                <option value="Horror" {% if selected_genre == "Horror" %}selected{% endif %}>Horror</option>
                <option value="Romance" {% if selected_genre == "Romance" %}selected{% endif %}>Romance</option>
            </select>

            <button class="btn btn-primary w-100 mt-3">
                Recommend Movies
            </button>
        </form>

        <hr>

        <h3 class="text-center mb-4">Recommended Movies</h3>

        <div class="row">

            {% for movie in recommendation %}

            <div class="col-md-4 col-lg-3 mb-4">

                <div class="card shadow">

                    <img src="{{ movie.image }}" class="poster" alt="{{ movie.name }}">

                    <div class="card-body">

                        <h5 class="card-title">{{ movie.name }}</h5>

                        <p><strong>⭐ Rating:</strong> {{ movie.rating }}</p>

                        <p><strong>📅Year:</strong> {{ movie.year }}</p>

                        <p class="description">
                            {{ movie.description }}
                        </p>
                        
                        <a href="{{ movie.trailer }}" target="_blank" class="btn btn-danger">
    ▶ Watch Trailer
</a>



                    </div>

                </div>

            </div>

            {% empty %}

            <p class="text-center">No movies selected.</p>

            {% endfor %}

        </div>

    </div>

</div>

</body>
</html>
